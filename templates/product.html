{% extends "base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="rounded-3xl overflow-hidden bg-white border border-zinc-100 shadow-sm">
            <img src="{{ product.image_url }}" alt="{{ product.name }}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
        </div>
        <div class="flex flex-col justify-center">
            <div class="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-2">{{ product.category.name }}</div>
            <h1 class="text-4xl font-bold text-zinc-900 mb-4">{{ product.name }}</h1>
            <p class="text-xl text-zinc-900 font-bold mb-6">₹{{ "{:,.2f}".format(product.price) }}</p>
            <div class="prose prose-zinc mb-8">
                <p class="text-zinc-500 leading-relaxed">{{ product.description }}</p>
            </div>
            
            <div class="flex gap-4">
                <form action="/cart/add/{{ product.id }}" method="POST" class="flex-1">
                    <button type="submit" class="w-full py-4 bg-zinc-900 text-white font-bold rounded-2xl hover:bg-zinc-800 transition-colors shadow-xl shadow-zinc-200">
                        Add to Cart
                    </button>
                </form>
                <button class="p-4 rounded-2xl border border-zinc-200 hover:bg-zinc-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
