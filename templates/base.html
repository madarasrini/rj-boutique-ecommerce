<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PythonStore - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
    <nav class="bg-white border-b border-zinc-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-8">
                    <a href="/" class="text-xl font-bold tracking-tight">PythonStore</a>
                    <div class="hidden md:flex gap-6 text-sm font-medium text-zinc-500">
                        <a href="/" class="hover:text-zinc-900 transition-colors">Shop</a>
                        <a href="#" class="hover:text-zinc-900 transition-colors">Categories</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    {% if user %}
                        <span class="text-sm text-zinc-500">Hi, {{ user.full_name }}</span>
                        {% if user.is_admin %}
                            <a href="/admin" class="text-sm font-medium text-blue-600">Admin</a>
                        {% endif %}
                        <a href="/cart" class="p-2 hover:bg-zinc-100 rounded-full transition-colors relative">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                            </svg>
                        </a>
                        <a href="/logout" class="text-sm font-medium text-zinc-500 hover:text-zinc-900">Logout</a>
                    {% else %}
                        <a href="/login" class="text-sm font-medium text-zinc-900">Login</a>
                        <a href="#" class="px-4 py-2 bg-zinc-900 text-white text-sm font-medium rounded-lg hover:bg-zinc-800 transition-colors">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-zinc-100 mt-20 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-zinc-500 text-sm">
            &copy; 2026 PythonStore. Built with FastAPI & SQLAlchemy.
        </div>
    </footer>
</body>
</html>
